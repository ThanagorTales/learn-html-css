<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio Tabela 2</title>
    <style>
        table{
            width: 400px;
            height: 300px;
            border-collapse: collapse;
            text-align: center;
        }
        th, td{
            border: solid 1px black;
            padding: 10px;
        }
        
        .titulos{
            background-color: rgb(68, 67, 67);
            color: white;
        }
        .medias{
            text-align: left;
        }
    </style>
</head>
<body>
    <table>
        <tr class="titulos">
        <th rowspan="2">Área</th>
        <th rowspan="2">Disciplinas</th>
        <th colspan="2">Notas</th>
        <th rowspan="2">Média</th>
        </tr>
        <tr class="titulos">
            <th>Nota 1</th>
            <th>Nota 2</th>
        </tr>
        <tr>
            <th rowspan="4">Exatas</th>
            <td>Matemática</td>
            <td>0</td>
            <td>0</td>
            <td>0</td>
        </tr>
        <tr>
            <td>Física</td>
            <td>0</td>
            <td>0</td>
            <td>0</td>
        </tr>
        <tr>
            <td>Química</td>
            <td>0</td>
            <td>0</td>
            <td>0</td>
        </tr>
        <tr>
            <td>Biologia</td>
            <td>0</td>
            <td>0</td>
            <td>0</td>
        </tr>
        <tr class="titulos">
            <th colspan="4" class="medias">Média de Exatas</th>
            <td><strong>0</strong></td>
        </tr>
        <tr>
            <th rowspan="2">Humanas</th>
            <td>História</td>
            <td>0</td>
            <td>0</td>
            <td>0</td>
        </tr>
        <tr>
            <td>Geografia</td>
            <td>0</td>
            <td>0</td>
            <td>0</td>
        </tr>
        <tr class="titulos">
            <th colspan="4" class="medias">Média de Humanas</th>
            <td><strong>0</strong></td>
        </tr>
    </table>
</body>
</html>
