<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio de Grid Layout</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        .container{          
            display: grid;
            grid-template-rows: 80px 40px 1fr 40px;
            grid-template-columns: 1fr 250px;

            width: 100vw;
            height: 100vh;
        }
        header{
            grid-area: 1 / 1 / 2 / -1;

            background-color: darkred;
        }
        nav{
            grid-area: 2 / 1 / 3 / -1;

            background-color: darkred;
            border: 2px solid black;
        }
        main{
            grid-area: 3 / 1 / -2 / -2;
            
            border: 2px dotted black;
            background-color: rgb(177, 44, 21);
        }
        aside{
            grid-area: 3 / - 2 / -2 / -1;

            border: 2px dotted black;
            background-color: rgb(177, 44, 21);
        }
        footer{
            grid-area: -2 / 1 / -1 / -1;

            border: 2px dotted black;
            background-color: rgb(97, 29, 16);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>

        </header>
        <nav>

        </nav>
        <main>
            
        </main>
        <aside>

        </aside>
        <footer>

        </footer>
    </div>



</body>
</html>
